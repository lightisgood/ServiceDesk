<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="מלם Service Desk">
  <meta name="theme-color" content="#0a1628">
  <title>מלם Service Desk</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap');
    :root {
      --bg:#060e1c;--card:#0d1f3c;--input:#0a1628;
      --accent:#1e6fff;--glow:#1e6fff55;--accent2:#00c8ff;
      --text:#e8eef8;--muted:#6a7f9c;--border:#1a3050;
      --success:#00d68f;--r:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:'Heebo',sans-serif;color:var(--text);}

    /* orbs */
    .orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.3;animation:drift 8s ease-in-out infinite alternate;}
    .orb1{width:300px;height:300px;background:#1e4fff;top:-60px;right:-60px;}
    .orb2{width:240px;height:240px;background:#0099cc;bottom:25%;left:-70px;animation-delay:-3s;}
    .orb3{width:160px;height:160px;background:#6600ff;bottom:-40px;right:25%;animation-delay:-5s;}
    @keyframes drift{to{transform:translate(18px,28px) scale(1.1);}}

    /* screens */
    .screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .3s;}
    .screen.hidden{opacity:0;pointer-events:none;transform:translateY(20px);}

    /* ── LOGIN ── */
    #s-login{align-items:center;justify-content:flex-end;padding-bottom:env(safe-area-inset-bottom,24px);}
    .card{
      position:relative;z-index:1;width:100%;max-width:420px;
      background:rgba(13,31,60,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;
      padding:32px 26px 38px;
    }
    .brand{text-align:center;margin-bottom:26px;}
    .brand-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 0 28px var(--glow);}
    .brand h1{font-size:21px;font-weight:900;}
    .brand p{font-size:12px;color:var(--muted);margin-top:3px;}

    .field{margin-bottom:13px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
    .field input{width:100%;background:var(--input);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
    .field input::placeholder{color:var(--muted);}
    .hint{font-size:11px;color:var(--muted);margin-top:4px;}

    .row{display:flex;align-items:center;gap:10px;margin-bottom:20px;cursor:pointer;}
    .tog{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;transition:background .2s;flex-shrink:0;}
    .tog.on{background:var(--accent);}
    .tog::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;}
    .tog.on::after{left:21px;}
    .row span{font-size:14px;color:var(--muted);user-select:none;}

    .btn{width:100%;padding:15px;border:none;border-radius:13px;font-family:inherit;font-size:16px;font-weight:700;color:#fff;cursor:pointer;transition:transform .15s,opacity .15s;}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#0099ff);box-shadow:0 4px 20px var(--glow);}
    .btn-primary:active{transform:scale(.97);}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);margin-top:10px;}
    .btn-ghost:active{border-color:var(--accent);}

    /* ── WEBVIEW ── */
    #s-webview{background:#f0f0f0;}
    .bar{
      display:flex;align-items:center;gap:8px;
      padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 10px;
      background:var(--bg);border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .bar-title{flex:1;font-size:13px;font-weight:700;color:var(--accent2);text-align:center;}
    .bar-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;line-height:1;}
    .bar-btn:active{background:var(--border);}
    iframe{flex:1;width:100%;border:none;}

    /* MFA badge */
    .mfa-note{
      background:rgba(30,111,255,.15);
      border:1px solid rgba(30,111,255,.3);
      border-radius:10px;padding:10px 14px;
      font-size:12px;color:var(--muted);
      margin-bottom:18px;line-height:1.6;
      position:relative;z-index:1;
    }
    .mfa-note b{color:var(--text);}

    /* install banner */
    #banner{position:fixed;bottom:0;left:0;right:0;z-index:999;background:var(--card);border-top:1px solid var(--border);padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));display:none;flex-direction:column;gap:8px;animation:up .3s ease;}
    @keyframes up{from{transform:translateY(100%);}}
    #banner.show{display:flex;}
    .b-row{display:flex;align-items:center;gap:10px;}
    .b-text{flex:1;}
    .b-text strong{font-size:13px;font-weight:700;display:block;}
    .b-text span{font-size:11px;color:var(--muted);}
    .b-steps{font-size:11px;color:var(--muted);line-height:1.7;}
    .b-steps b{color:var(--text);}
    .b-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  </style>
</head>
<body>

<div class="orbs">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>

<!-- ── LOGIN ── -->
<div id="s-login" class="screen">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🛠️</div>
      <h1>מלם Service Desk</h1>
      <p>כניסה למערכת ניהול קריאות</p>
    </div>

    <div class="mfa-note">
      <b>כניסה דו-שלבית:</b> האפליקציה תמלא את הפרטים אוטומטית ותפתח את המסך הבא — שם תכניס את קוד ה-SMS כרגיל.
    </div>

    <div class="field">
      <label>דומיין \ שם משתמש</label>
      <input id="u" type="text" autocomplete="username" placeholder="לדוגמה: Ayalond\Ori" dir="ltr">
      <div class="hint">פורמט: DOMAIN\username</div>
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input id="p" type="password" autocomplete="current-password" placeholder="הכנס סיסמה" dir="ltr">
    </div>

    <div class="row" onclick="toggleRem()">
      <div class="tog" id="tog"></div>
      <span>זכור אותי</span>
    </div>

    <button class="btn btn-primary" onclick="doLogin()">כניסה למערכת ←</button>
  </div>
</div>

<!-- ── WEBVIEW (MFA + rest of session) ── -->
<div id="s-webview" class="screen hidden">
  <div class="bar">
    <button class="bar-btn" onclick="goBack()">←</button>
    <span class="bar-title">🛠️ מלם Service Desk</span>
    <button class="bar-btn" onclick="doRefresh()">↻</button>
    <button class="bar-btn" onclick="doLogout()" title="התנתק">⎋</button>
  </div>
  <iframe id="frame" allow="same-origin scripts forms popups"></iframe>
</div>

<!-- INSTALL BANNER -->
<div id="banner">
  <div class="b-row">
    <span style="font-size:24px">📲</span>
    <div class="b-text">
      <strong>הוסף למסך הבית</strong>
      <span>גישה מהירה כמו אפליקציה</span>
    </div>
    <button class="b-x" onclick="dismissBanner()">✕</button>
  </div>
  <div class="b-steps">לחץ <b>שתף ⬆</b> ← בחר <b>"הוסף למסך הבית"</b> ← אשר</div>
</div>

<!-- Hidden POST form -->
<form id="lf" method="POST" action="https://servicedesk.malam.com/CAisd/pdmweb.exe" target="frame" style="display:none">
  <input type="hidden" name="PortalSession" value="">
  <input type="hidden" name="USERNAME" id="fu">
  <input type="hidden" name="PIN"      id="fp">
  <input type="hidden" name="PINCODE"  value="">
  <input type="hidden" name="PDA"      value="No">
  <input type="hidden" name="OP"       value="LOGIN">
  <input type="hidden" name="INITIAL_LOAD" value="PortalSession%3D%2BPINCODE%3D%2BOP%3DLOGIN">
</form>

<script>
  const BASE = 'https://servicedesk.malam.com/CAisd/pdmweb.exe';
  let rem = false;

  (function init() {
    const s = localStorage.getItem('sd');
    if (s) {
      try {
        const {u,p} = JSON.parse(s);
        document.getElementById('u').value = u;
        document.getElementById('p').value = p;
        rem = true;
        document.getElementById('tog').classList.add('on');
      } catch(e){}
    }
    showBanner();
  })();

  function toggleRem() {
    rem = !rem;
    document.getElementById('tog').classList.toggle('on', rem);
    if (!rem) localStorage.removeItem('sd');
  }

  function doLogin() {
    const u = document.getElementById('u').value.trim();
    const p = document.getElementById('p').value;
    if (!u || !p) { alert('יש להזין שם משתמש וסיסמה.'); return; }
    if (rem) localStorage.setItem('sd', JSON.stringify({u,p}));

    // Point iframe to frame name, submit POST into it
    document.getElementById('fu').value = u;
    document.getElementById('fp').value = p;

    // Show webview first so iframe exists as target
    show('s-webview');

    // Small delay to let iframe render, then submit
    setTimeout(() => {
      document.getElementById('lf').submit();
    }, 80);
  }

  function goBack() {
    try { document.getElementById('frame').contentWindow.history.back(); } catch(e){}
  }

  function doRefresh() {
    try { document.getElementById('frame').contentWindow.location.reload(); } catch(e) {
      document.getElementById('frame').src = document.getElementById('frame').src;
    }
  }

  function doLogout() {
    if (!confirm('להתנתק?')) return;
    document.getElementById('frame').src = 'about:blank';
    show('s-login');
  }

  function show(id) {
    ['s-login','s-webview'].forEach(s =>
      document.getElementById(s).classList.toggle('hidden', s !== id)
    );
  }

  function showBanner() {
    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const safari = /safari/i.test(navigator.userAgent) && !/crios|fxios/i.test(navigator.userAgent);
    if (ios && safari && !navigator.standalone && !sessionStorage.getItem('bd')) {
      setTimeout(() => document.getElementById('banner').classList.add('show'), 2000);
    }
  }

  function dismissBanner() {
    sessionStorage.setItem('bd','1');
    document.getElementById('banner').classList.remove('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('s-login').classList.contains('hidden')) doLogin();
  });
</script>
</body>
</html>
